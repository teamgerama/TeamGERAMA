{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a href="{% url 'school_list' %}" class="text-success text-decoration-none">Schools</a></li>
            <li class="breadcrumb-item active">{{ school.name }}</li>
        </ol>
    </nav>

    <div class="text-center mb-5">
        <h2 class="fw-bold">School of <span class="text-success">{{ school.name }}</span></h2>
        <p class="text-muted">Select a department to view available programmes.</p>
    </div>

    <div class="row g-4 justify-content-center">
        {% for dept in departments %}
        <div class="col-md-6 col-lg-4">
            <a href="{% url 'dept_detail' dept.id %}" class="text-decoration-none">
                <div class="card h-100 shadow-sm border-0 border-start border-success border-4 p-4 hover-shadow transition">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 text-success fs-3 me-3">
                            <i class="bi bi-building"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold text-dark mb-0">{{ dept.name }}</h5>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p class="text-muted">No departments added yet for this school.</p>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .transition { transition: transform 0.2s ease-in-out; }
    .hover-shadow:hover { transform: translateY(-5px); }
</style>
{% endblock %}
