{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5 py-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold display-5">Academic <span class="text-success">Schools</span></h2>
        <p class="text-muted lead">Select your school to browse departments and resources.</p>
    </div>

    <div class="row g-4 justify-content-center">
        {% for school in schools %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden bg-white">
                <div class="card-body p-4 text-center">
                    <div class="mb-3 text-success fs-1">
                        <i class="bi bi-mortarboard-fill"></i>
                    </div>
                    <h4 class="card-title fw-bold text-uppercase">{{ school.name }}</h4>
                    <hr class="my-4 text-warning border-2 opacity-50">

                    <!-- This is the clean link to the next stage -->
                    <a href="{% url 'school_detail' school.id %}" class="btn btn-success rounded-pill px-4">
                        Explore Departments
                    </a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p class="text-muted">No schools found.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
