{% extends 'base.html' %}
{% block content %}
<div class="container my-5 text-center">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb small justify-content-center">
            <li class="breadcrumb-item"><a href="{% url 'school_list' %}" class="text-success text-decoration-none">Schools</a></li>
            <li class="breadcrumb-item"><a href="{% url 'dept_detail' programme.department.id %}" class="text-success text-decoration-none">{{ programme.department.name }}</a></li>
            <li class="breadcrumb-item active">{{ programme.name }}</li>
        </ol>
    </nav>

    <h2 class="fw-bold mt-4">{{ programme.name }}</h2>
    <p class="text-muted">Select your current level</p>
    <div class="row g-3 mt-2">
        {% for lvl in levels %}
        <div class="col-6 col-md-3">
            <a href="{% url 'level_detail' programme.pk lvl %}" class="btn btn-outline-success btn-lg w-100 py-4 shadow-sm fw-bold">
                Level {{ lvl }}
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
