{% extends 'base.html' %}
{% block content %}
<div class="container my-5 text-center">
    <h2 class="fw-bold">{{ programme.name }}</h2>
    <p class="text-muted">Select your current level</p>
    <div class="row g-3 mt-4">
        {% for lvl in "100,200,300,400"|split:"," %}
        <div class="col-6 col-md-3">
            <a href="{% url 'level_detail' programme.pk lvl %}" class="btn btn-outline-success btn-lg w-100 py-4 shadow-sm fw-bold">
                Level {{ lvl }}
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
